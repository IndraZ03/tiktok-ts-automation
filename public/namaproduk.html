<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nama Produk Extractor - Tokopedia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #030712;
      color: #f3f4f6;
    }
    .glass-panel {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .gradient-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      transition: all 0.3s ease;
    }
    .gradient-btn:hover {
      background: linear-gradient(135deg, #34d399, #10b981);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.5);
    }
    .gradient-btn:active {
      transform: scale(0.98);
    }
    .result-box {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="min-h-screen relative overflow-x-hidden flex flex-col justify-between">
  <!-- Glowing Background Orbs -->
  <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-emerald-950/20 blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-teal-950/20 blur-[120px] pointer-events-none"></div>

  <!-- Navbar / Header Links -->
  <header class="max-w-4xl mx-auto w-full p-6 relative z-10 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🛍️</span>
      <span class="font-extrabold text-xl bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">Tokopedia Extractor</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="/grokbot" class="text-xs px-3.5 py-2 rounded-xl bg-gray-900/80 hover:bg-gray-800 border border-gray-800 text-gray-300 hover:text-white transition font-medium">← Grokbot</a>
      <a href="/" class="text-xs px-3.5 py-2 rounded-xl bg-gray-900/80 hover:bg-gray-800 border border-gray-800 text-gray-300 hover:text-white transition font-medium">State Manager</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto w-full px-6 py-8 relative z-10 flex-1 flex flex-col justify-center">
    <div class="glass-panel rounded-3xl p-8 border border-gray-800/80 shadow-2xl">
      <h1 class="text-2xl font-extrabold text-white mb-2 flex items-center gap-2">
        <span>🔍</span> Ekstrak Nama Produk Tokopedia
      </h1>
      <p class="text-gray-400 text-xs mb-6">Masukkan link share atau link produk Tokopedia untuk mengambil nama produk secara otomatis menggunakan Playwright.</p>

      <form id="extract-form" class="space-y-4">
        <div>
          <label for="product-url" class="text-xs text-gray-400 font-semibold block mb-1.5">Link Produk Tokopedia</label>
          <input type="url" id="product-url" name="url" required
                 placeholder="https://vt.tokopedia.com/t/ZS9Yx3Ank8Dnd-VBCqO/ atau https://www.tokopedia.com/..."
                 class="w-full bg-gray-950/80 border border-gray-800 focus:border-emerald-500/50 rounded-2xl px-5 py-4 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 transition-all duration-300">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full gradient-btn text-zinc-950 py-4 rounded-2xl text-base font-extrabold shadow-lg hover:shadow-emerald-500/25 transition-all flex items-center justify-center gap-2">
          <span>✨</span> Ambil Nama Produk
        </button>
      </form>

      <!-- Status Display -->
      <div id="status-container" class="mt-6 hidden p-4 rounded-2xl border transition-all duration-300">
        <div class="flex items-center gap-3">
          <span id="status-icon" class="text-lg"></span>
          <span id="status-text" class="text-sm font-semibold"></span>
        </div>
      </div>

      <!-- Result Display -->
      <div id="result-container" class="mt-6 hidden space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Hasil Ekstraksi:</span>
          <button onclick="copyToClipboard()" id="copy-btn"
                  class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white px-3 py-1.5 rounded-xl border border-gray-700 transition flex items-center gap-1.5">
            <span>📋</span> Salin
          </button>
        </div>
        <div id="result-box" class="result-box w-full bg-gray-950/80 border border-gray-800/80 rounded-2xl p-5 text-sm text-gray-100 break-words leading-relaxed"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="max-w-4xl mx-auto w-full p-6 text-center text-xs text-gray-600 relative z-10">
    &copy; 2026 Tokopedia Product Name Extractor Bot. Powered by Playwright.
  </footer>

  <script>
    const form = document.getElementById('extract-form');
    const input = document.getElementById('product-url');
    const btn = document.getElementById('submit-btn');
    const statusContainer = document.getElementById('status-container');
    const statusIcon = document.getElementById('status-icon');
    const statusText = document.getElementById('status-text');
    const resultContainer = document.getElementById('result-container');
    const resultBox = document.getElementById('result-box');
    const copyBtn = document.getElementById('copy-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = input.value.trim();
      if (!url) return;

      // Set Loading state
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-zinc-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Mengekstrak data...
      `;

      statusContainer.className = 'mt-6 p-4 rounded-2xl border border-emerald-500/20 bg-emerald-950/20 text-emerald-300';
      statusIcon.textContent = '🕵️‍♂️';
      statusText.textContent = 'Membuka link Tokopedia dan mengekstrak tag [data-fmp="true"]...';
      statusContainer.classList.remove('hidden');
      resultContainer.classList.add('hidden');

      try {
        const response = await fetch('/api/namaproduk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          statusContainer.className = 'mt-6 p-4 rounded-2xl border border-emerald-500/30 bg-emerald-950/40 text-emerald-400';
          statusIcon.textContent = '✅';
          statusText.textContent = 'Berhasil mengekstrak nama produk!';
          
          resultBox.textContent = data.name;
          resultContainer.classList.remove('hidden');
        } else {
          throw new Error(data.error || 'Gagal mengekstrak nama produk.');
        }
      } catch (err) {
        statusContainer.className = 'mt-6 p-4 rounded-2xl border border-red-500/20 bg-red-950/20 text-red-400';
        statusIcon.textContent = '❌';
        statusText.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>✨</span> Ambil Nama Produk';
      }
    });

    function copyToClipboard() {
      const text = resultBox.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.innerHTML = '<span>✅</span> Tersalin!';
        copyBtn.className = 'text-xs bg-emerald-900/30 hover:bg-emerald-900/50 text-emerald-400 px-3 py-1.5 rounded-xl border border-emerald-800 transition flex items-center gap-1.5';
        setTimeout(() => {
          copyBtn.innerHTML = '<span>📋</span> Salin';
          copyBtn.className = 'text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white px-3 py-1.5 rounded-xl border border-gray-700 transition flex items-center gap-1.5';
        }, 2000);
      });
    }
  </script>
</body>
</html>
